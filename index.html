<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shop System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1 class="shop-title">🛒 Premium Shop</h1>
            <div class="balance-container">
                <span class="balance-emoji">💰</span>
                <span>Balance: $<span id="balance">2500</span></span>
                <span class="balance-amount" id="balanceAmount">2,500</span>
            </div>
        </div>

        <!-- SHOP GRID -->
        <div class="shop-grid" id="shopGrid"></div>

        <!-- CART PANEL -->
        <div class="cart-panel">
            <h2 class="cart-title">🛒 Shopping Cart</h2>
            <div class="cart-items" id="cartItems">
                <div class="empty-cart">
                    Your cart is empty. Start shopping! 🛍️
                </div>
            </div>
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>
                ✅ Complete Purchase
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
